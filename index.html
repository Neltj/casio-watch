<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Megadeth Watch - Rust in Peace</title>
    <link rel="stylesheet" href="style.css">
    <!-- Font stile metal classico invece di Creepster -->
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Wallpoet&family=Teko:wght@600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="watch-container">
        <!-- Tasti laterali rugginosi -->
        <div class="watch-button button-top-left" id="lightBtn" title="Nuclear Light"></div>
        <div class="watch-button button-bottom-left" id="modeBtn" title="Countdown to Extinction"></div>
        <div class="watch-button button-top-right" id="weatherBtn" title="Tornado of Souls (Weather)"></div>
        <div class="watch-button button-bottom-right" id="setBtn" title="Stop Music"></div>
        
        <!-- Corpo centrale Metal -->
        <div class="watch-body">
            <div class="watch-brand">MEGADETH</div>
            <div class="watch-model">RUST IN PEACE</div>
            
            <div class="watch-screen-border">
                <div class="watch-screen" id="watchScreen">
                    <!-- Lucetta rossa -->
                    <div class="light-bulb" id="lightBulb"></div>
                    
                    <!-- Display Orologio -->
                    <div id="timeMode" class="screen-mode active">
                        <div class="date-display" id="dateDisplay">LUN 01 GEN</div>
                        <div class="time-display" id="timeDisplay">00:00:00</div>
                    </div>

                    <!-- Display Meteo -->
                    <div id="weatherMode" class="screen-mode">
                        <div class="weather-top" id="weatherLocation">--</div>
                        <div class="weather-main">
                            <span class="weather-icon" id="weatherIcon">☀</span>
                            <span class="weather-temp" id="weatherTemp">--°</span>
                        </div>
                        <div class="weather-loading" id="weatherLoading"></div>
                    </div>
                </div>
            </div>
            
            <!-- Music Player / Cinghia -->
            <div class="music-player">
                <div class="player-status" id="playerStatus">AUDIO PLAYER: STOPPED</div>
                <div class="music-buttons">
                    <button class="track-btn" data-track="Holy Wars... The Punishment Due Megadeth">HOLY WARS</button>
                    <button class="track-btn" data-track="Symphony of Destruction Megadeth">SYMPHONY</button>
                    <button class="track-btn" data-track="Tornado of Souls Megadeth">TORNADO</button>
                    <button class="track-btn" data-track="Peace Sells Megadeth">PEACE SELLS</button>
                </div>
            </div>
            
            <!-- Elemento Audio invisibile -->
            <audio id="metalAudio"></audio>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
